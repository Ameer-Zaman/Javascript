<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    <title>To-Do List</title>
</head>
<body>
    <div class="todo-app">
        <!-- Header -->
        <div class="todo-header">
            <h1><i class="fa-solid fa-clipboard"></i> My To Do List</h1>
        </div>

        <!-- To Do Input -->
        <div class="todo-input">
            <input type="text" placeholder="Add a new Task...">
            <button id="addButton">Add</button>
        </div>

        <!-- To Do Filters -->
        <div class="todo-filters">
            <button class="active">All</button>
            <button class="unactive">Pending</button>
            <button class="unactive">Complete</button>
        </div>

        <!-- To Do List -->
         <div class="todo-list">
            
            <div class="list">
                <div class="check">
                    <input type="checkbox" id="checkbox">
                <label for="">Html</label>
                </div>
                <button id="deleteButton"><i class="fa-solid fa-trash"></i></button>
            </div>
            
         </div>

         <!-- To Do Footer -->
          <div class="todo-footer">
            <p id="totalTask">Total Task: <span id="task">0</span></p>
            <p id="completed">Completed: <span id="complete">0</span></p>
          </div>

    </div>
</body>
</html>
