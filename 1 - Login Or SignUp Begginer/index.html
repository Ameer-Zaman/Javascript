<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script defer src="app.js"></script>
    <title>Login or SignUp</title>
</head>
<body>
    <div class="container">
        <div class="contents">
       
        <!-- Header -->
        <div class="header">
            <h1>Login</h1>
        </div>
        
        <!-- Inputs Container -->
         <div class="inputContainer">
            <input type="text" placeholder="Enter your Username" id="username" required>
            <input type="password" placeholder="Enter your Password" id="password" required>
            <button class="button" onclick="login()">Login</button>
            <hr>
         </div>

         <!-- Other Logins -->
          <div class="otherLogins">
            <button id="google"><i class="fa-brands fa-google"></i></button>
            <button id="apple"><i class="fa-brands fa-apple"></i></button>
            <button id="facebook"><i class="fa-brands fa-facebook"></i></button>
          </div> 

         <!-- Create Account -->
          <div class="createAcc">
            <p>New to Cittato ? <a href="">Create Account</a></p>
          </div>
        </div>
    </div>
</body>
</html>
